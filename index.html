<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Linux.do Awesome Skills</title>
  <meta name="description" content="Linux.do 社区用户发布的 skills 清单与导航。">
  <style>
    :root {
      --ink: #202622;
      --muted: #66736c;
      --line: #d7dfd8;
      --paper: #f5f8f1;
      --panel: #ffffff;
      --green: #126d57;
      --green-deep: #0c473b;
      --red: #d64c31;
      --yellow: #f2c84b;
      --cyan: #0b7c83;
      --shadow: 0 14px 42px rgba(24, 36, 29, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(18, 109, 87, 0.08), transparent 34%),
        linear-gradient(225deg, rgba(214, 76, 49, 0.08), transparent 32%),
        repeating-linear-gradient(90deg, rgba(32, 38, 34, 0.035) 0 1px, transparent 1px 44px),
        var(--paper);
      font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    a {
      color: inherit;
    }

    .shell {
      width: min(1360px, calc(100% - 32px));
      margin: 0 auto;
      padding: 18px 0 42px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 10px 0 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
    }

    .mark {
      display: grid;
      width: 38px;
      height: 38px;
      place-items: center;
      border: 2px solid var(--ink);
      background: var(--yellow);
      box-shadow: 5px 5px 0 var(--ink);
    }

    .topnav {
      display: flex;
      align-items: center;
      gap: 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .topnav a {
      text-decoration: none;
    }

    .repo-link {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 32px;
      border: 1px solid var(--ink);
      padding: 0 10px;
      background: var(--ink);
      color: #fff;
      font-weight: 800;
      box-shadow: 4px 4px 0 var(--yellow);
    }

    .repo-link svg {
      width: 15px;
      height: 15px;
      fill: currentColor;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 260px;
      gap: 20px;
      align-items: end;
      padding: 18px 0 16px;
    }

    h1 {
      max-width: 760px;
      margin: 0;
      font-family: "Songti SC", "STSong", "Noto Serif CJK SC", serif;
      font-size: clamp(34px, 5.8vw, 64px);
      line-height: 1.02;
      font-weight: 800;
    }

    .lead {
      max-width: 760px;
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.65;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .stat {
      min-height: 92px;
      padding: 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.74);
      box-shadow: var(--shadow);
    }

    .stat strong {
      display: block;
      font-size: 30px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .controls {
      position: sticky;
      top: 0;
      z-index: 5;
      display: grid;
      grid-template-columns: minmax(260px, 0.9fr) minmax(0, 1.6fr);
      gap: 10px;
      align-items: center;
      margin: 12px 0 18px;
      padding: 10px;
      border: 1px solid var(--line);
      background: rgba(245, 248, 241, 0.9);
      backdrop-filter: blur(16px);
    }

    .search {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 40px;
      padding: 0 12px;
      border: 1px solid var(--line);
      background: var(--panel);
    }

    .search input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      font: inherit;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-start;
    }

    .chip {
      min-height: 30px;
      border: 1px solid var(--line);
      padding: 0 10px;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      font: inherit;
      font-size: 12px;
    }

    .chip[aria-pressed="true"] {
      border-color: var(--ink);
      background: var(--green-deep);
      color: #fff;
    }

    .skill-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(330px, 1fr));
      gap: 12px;
    }

    .skill-card {
      display: flex;
      flex-direction: column;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .skill-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 50px rgba(24, 36, 29, 0.14);
    }

    .card-head {
      padding: 15px 16px 14px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(11, 124, 131, 0.12), transparent 38%),
        #fff;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .card-meta span {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border: 1px solid rgba(215, 223, 216, 0.9);
      padding: 0 8px;
      background: rgba(255, 255, 255, 0.72);
    }

    h2 {
      margin: 0;
      font-size: 21px;
      line-height: 1.2;
    }

    .one-liner {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .card-body {
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 12px;
      padding: 14px 16px 16px;
    }

    .card-info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .section-title {
      margin: 0 0 6px;
      color: var(--green);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .tag-list,
    .use-list {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .tag-list li,
    .use-list li {
      border: 1px solid var(--line);
      padding: 4px 7px;
      background: #fbfcf8;
      font-size: 11px;
      line-height: 1.25;
    }

    .tag-list li {
      color: #526159;
    }

    .use-list li {
      color: var(--ink);
    }

    .tag-list li.more,
    .use-list li.more {
      color: var(--muted);
      background: rgba(245, 248, 241, 0.72);
    }

    .limit-note {
      margin: 0;
      border-left: 3px solid rgba(214, 76, 49, 0.38);
      padding: 8px 10px;
      background: rgba(214, 76, 49, 0.055);
      color: var(--muted);
      line-height: 1.55;
      font-size: 12px;
    }

    .limit-note strong {
      margin-right: 6px;
      color: var(--red);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: auto;
    }

    .button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 34px;
      border: 1px solid var(--ink);
      padding: 0 10px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 800;
    }

    .button.primary {
      background: var(--ink);
      color: #fff;
    }

    .button.secondary {
      background: #fff;
    }

    .forum-link img {
      width: 14px;
      height: 14px;
      border-radius: 3px;
    }

    .empty {
      display: none;
      padding: 28px;
      border: 1px dashed var(--line);
      color: var(--muted);
      text-align: center;
    }

    .footnote {
      margin: 28px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    @media (max-width: 780px) {
      .shell {
        width: min(100% - 24px, 1180px);
        padding-top: 18px;
      }

      .topbar,
      .hero,
      .controls {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
      }

      .topnav {
        flex-wrap: wrap;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .controls {
        position: static;
      }

      .filters {
        justify-content: flex-start;
      }

      .card-info-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

    const grid = document.querySelector("#skills");
    const searchInput = document.querySelector("#searchInput");
    const emptyState = document.querySelector("#emptyState");
    const skillCount = document.querySelector("#skill-count");
    const sourceCount = document.querySelector("#source-count");
    const chips = Array.from(document.querySelectorAll(".chip"));
    let activeFilter = "all";
    const knownLocalLinks = new Set([
      "README.md",
      "docs/collection-policy.md",
      ...skills.map((skill) => skill.detail)
    ]);

    function matchesSkill(skill, query) {
      const haystack = [
        skill.name,
        skill.author,
        skill.oneLiner,
        ...skill.tags,
        ...skill.prerequisites,
        ...skill.useCases,
        ...skill.limitations
      ].join(" ").toLowerCase();
      return haystack.includes(query.toLowerCase());
    }

    function createList(items, className) {
      const visible = items.slice(0, 4);
      const hiddenCount = items.length - visible.length;
      const more = hiddenCount > 0 ? [`+${hiddenCount}`] : [];
      return `<ul class="${className}">${
        visible.map((item) => `<li>${item}</li>`).join("")
      }${more.map((item) => `<li class="more">${item}</li>`).join("")}</ul>`;
    }

    function isRenderableLink(url) {
      if (!url) return false;
      if (url.startsWith("http") || url.startsWith("#")) return true;
      return knownLocalLinks.has(url);
    }

    function createActions(skill) {
      const actions = [
        { label: "详情", href: skill.detail, className: "primary" },
        { label: "GitHub", href: skill.repository, className: "secondary" },
        { label: "Stars", href: skill.stars, className: "secondary" },
        { label: "论坛", href: skill.source, className: "secondary forum-link", icon: skill.forumIcon }
      ];
      return actions
        .filter((action) => isRenderableLink(action.href))
        .map((action) => `
          <a class="button ${action.className}" href="${action.href}">
            ${action.icon ? `<img src="${action.icon}" alt="" width="14" height="14">` : ""}
            ${action.label}
          </a>
        `).join("");
    }

    function render() {
      const query = searchInput.value.trim();
      const filtered = skills.filter((skill) => {
        const filterMatched = activeFilter === "all" || skill.tags.includes(activeFilter);
        return filterMatched && matchesSkill(skill, query);
      });

      skillCount.textContent = String(skills.length);
      sourceCount.textContent = String(skills.filter((skill) => skill.source).length);
      grid.innerHTML = filtered.map((skill) => `
        <article class="skill-card">
          <div class="card-head">
            <div class="card-meta">
              <span>${skill.author}</span>
              <span>${skill.tags[0] || "Skill"}</span>
            </div>
            <h2>${skill.name}</h2>
            <p class="one-liner">${skill.oneLiner}</p>
          </div>
          <div class="card-body">
            <div class="card-info-grid">
              <div>
                <p class="section-title">前置要求</p>
                ${createList(skill.prerequisites, "use-list")}
              </div>
              <div>
                <p class="section-title">分类标签</p>
                ${createList(skill.tags, "tag-list")}
              </div>
            </div>
            <div>
              <p class="section-title">常见用途</p>
              ${createList(skill.useCases, "use-list")}
            </div>
            <p class="limit-note"><strong>留意</strong>${skill.limitations[0] || "查看详情页了解完整限制。"}</p>
            <div class="actions">
              ${createActions(skill)}
            </div>
          </div>
        </article>
      `).join("");
      emptyState.style.display = filtered.length ? "none" : "block";
    }

    chips.forEach((chip) => {
      chip.addEventListener("click", () => {
        activeFilter = chip.dataset.filter;
        chips.forEach((item) => item.setAttribute("aria-pressed", String(item === chip)));
        render();
      });
    });

    searchInput.addEventListener("input", render);
    render();
  </script>
